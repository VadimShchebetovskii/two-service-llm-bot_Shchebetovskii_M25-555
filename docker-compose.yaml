services:
  auth-service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: auth-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ./auth_service/.env
    ports:
      - "8000:8000"
    volumes:
      - ./auth_service/auth.db:/app/auth.db
    restart: unless-stopped
    networks:
      - app-network

  bot-service:
    build:
      context: ./bot_service
      dockerfile: Dockerfile
    container_name: bot-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    env_file:
      - ./bot_service/.env
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: "redis:7-alpine"
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - app-network

  rabbitmq:
    image: "rabbitmq:3-management-alpine"
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-guest}
    restart: unless-stopped
    networks:
      - app-network

  celery-worker:
    build:
      context: ./bot_service
      dockerfile: Dockerfile
    container_name: celery-worker
    command: celery -A app.infra.celery_app worker --loglevel=info
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge